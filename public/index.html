<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>OKX DCD 분석</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f5f5f5;color:#1a1a1a;max-width:500px;margin:0 auto}
.hd{background:#fff;border-bottom:1px solid #eee;padding:10px 14px 8px;position:sticky;top:0;z-index:10}
.tabs{display:flex;gap:5px;margin-bottom:7px}
.tab{flex:1;padding:7px 3px;border-radius:9px;border:1.5px solid #e0e0e0;background:#fff;cursor:pointer;text-align:center;line-height:1.3}
.tab.on{border-color:var(--ac);background:var(--li)}
.tl{font-size:11px;font-weight:700;color:#888}.tab.on .tl{color:var(--ac)}
.tt{font-size:9px;padding:1px 5px;border-radius:4px;font-weight:700;display:inline-block;margin-top:2px}
.ctrl{display:flex;gap:7px;margin-top:8px;flex-wrap:wrap}
select{font-size:12px;padding:7px 8px;border-radius:7px;border:1px solid #ddd;background:#fff;color:#1a1a1a}
.rb{flex:2;min-width:100px;padding:8px 0;border-radius:7px;border:none;background:var(--ac);color:#fff;font-size:13px;font-weight:700;cursor:pointer}
.rb:disabled{background:#ccc;cursor:not-allowed}
.pg{padding:12px 14px 24px}
.card{background:#fff;border:1px solid #eee;border-radius:12px;padding:13px 15px;margin-bottom:10px}
.ct{font-size:9px;color:#999;text-transform:uppercase;letter-spacing:.05em;font-weight:700;margin-bottom:8px}
.mg{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px}
.mc{background:#f7f7f7;border-radius:10px;padding:11px 12px}
.ml{font-size:9px;color:#999;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.mv{font-size:16px;font-weight:700;font-family:monospace}
.ms{font-size:10px;color:#aaa;margin-top:2px;font-family:monospace}
.rr{display:flex;align-items:center;gap:7px;margin-bottom:4px;font-size:10px;color:#888;font-family:monospace}
.ro{flex:1;height:4px;background:#f0f0f0;border-radius:2px;overflow:hidden}
.ri{height:100%;border-radius:2px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.rb2{height:4px;background:#f0f0f0;border-radius:2px;margin-top:5px;overflow:hidden}
.rbi2{height:100%;border-radius:2px}
.pgrid{display:grid;grid-template-columns:1fr 1fr 54px 32px;gap:4px}
.pr{padding:5px 7px;border-radius:7px;margin-bottom:2px}
.rrb{height:5px;background:#f0f0f0;border-radius:3px;overflow:hidden;margin:8px 0 3px}
.rbl{display:flex;justify-content:space-between;font-size:9px;color:#ccc}
.rrow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:12px;border-bottom:1px solid #f0f0f0}
.rrow:last-child{border-bottom:none}
.bdg{font-size:11px;font-weight:700;padding:3px 10px;border-radius:6px}
.em{text-align:center;padding:48px 0;color:#aaa}
.ld{text-align:center;padding:40px 0}
.eb{background:#FCEBEB;color:#A32D2D;border-radius:10px;padding:10px 13px;font-size:12px;margin-bottom:12px}
.ts{font-size:10px;color:#bbb;font-family:monospace;text-align:right;margin-bottom:8px}
.disc{font-size:11px;color:#ccc;line-height:1.5;margin-top:4px}
.sb{width:100%;padding:9px;border:none;border-radius:8px;font-size:13px;font-weight:700;color:#fff;cursor:pointer;background:var(--ac)}
.pick-card{border:1.5px solid #eee;border-radius:10px;padding:11px 13px;cursor:pointer;background:#fff;margin-bottom:7px}
.pick-card.on{border-color:var(--ac);background:var(--li)}
.eb2{font-size:11px;background:none;border:1px solid #ddd;border-radius:6px;padding:3px 8px;cursor:pointer;color:#666}
.modal-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:100;display:flex;align-items:center;justify-content:center}
.modal-box{background:#fff;border-radius:14px;width:90%;max-width:400px;max-height:70vh;overflow-y:auto;padding:16px}
</style>
</head>
<body>
<div id="app"></div>
<script>
var INSTS=[
  {key:"BTC-C",label:"BTC-USDG 콜",tag:"CALL",coin:"BTC",optType:"C",quoteCcy:"USDG",ac:"#BA7517",li:"#FAEEDA",tBg:"#FAEEDA",tC:"#854F0B"},
  {key:"ETH-C",label:"ETH-USDG 콜",tag:"CALL",coin:"ETH",optType:"C",quoteCcy:"USDG",ac:"#185FA5",li:"#E6F1FB",tBg:"#FAEEDA",tC:"#854F0B"},
  {key:"ETH-P",label:"USDG-ETH 풋",tag:"PUT",coin:"ETH",optType:"P",quoteCcy:"USDG",ac:"#3B6D11",li:"#EAF3DE",tBg:"#EAF3DE",tC:"#3B6D11"},
  {key:"XAUT-C",label:"XAUT-USDT 콜",tag:"CALL",coin:"XAUT",optType:"C",quoteCcy:"USDT",ac:"#D4AF37",li:"#FBF7E7",tBg:"#FAEEDA",tC:"#854F0B"},
  {key:"XAUT-P",label:"USDT-XAUT 풋",tag:"PUT",coin:"XAUT",optType:"P",quoteCcy:"USDT",ac:"#B8860B",li:"#F9F2D8",tBg:"#EAF3DE",tC:"#3B6D11"}
];
var HK="dcd-h5-v2";
var SAF={safe:{l:"안전",bg:"#EAF3DE",c:"#3B6D11"},moderate:{l:"보통",bg:"#FAEEDA",c:"#854F0B"},caution:{l:"주의",bg:"#FCEBEB",c:"#A32D2D"}};

function fmt(n,d){if(n==null)return"-";return Number(n).toLocaleString("en-US",{minimumFractionDigits:d||0,maximumFractionDigits:d||0});}
function fgC(v){return v<30?"#A32D2D":v<50?"#854F0B":v<75?"#3B6D11":"#185FA5";}
function slv(s){return s>=70?"safe":s>=50?"moderate":"caution";}
function lsGet(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

var S={
  sk:"BTC-C",exp:3,
  phase:"idle",data:null,err:"",ts:"",
  selPick:0,
  hist:lsGet(HK,[]),
  showTodayModal:false
};

function init(){
  S.hist=lsGet(HK,[]);
  render();
}

function inst(){return INSTS.find(function(x){return x.key===S.sk;});}

function top3(){
  if(!S.data)return[];
  var i=inst(),d=S.data;
  return (d.products||[])
    .filter(function(p){return i.optType==="C"?p.strikeNum>=d.safeStrike:p.strikeNum<=d.safeStrike;})
    .sort(function(a,b){return b.apy-a.apy;})
    .slice(0,3);
}

function runAnalysis(){
  var i=inst();
  S.phase="loading";S.err="";S.data=null;S.selPick=0;render();
  fetch("/data?coin="+i.coin+"&optType="+i.optType+"&quoteCcy="+i.quoteCcy+"&expiryDays="+S.exp)
    .then(function(r){
      if(!r.ok) throw new Error(r.status===500?"현재 서버에서 " + i.coin + "/" + i.quoteCcy + " 데이터를 지원하지 않습니다 (500)":"서버 오류 " + r.status);
      return r.json();
    })
    .then(function(d){
      if(d.error) throw new Error(d.error);
      S.data=d;S.ts=new Date().toLocaleTimeString("ko-KR");S.phase="done";render();
    })
    .catch(function(e){
      S.err=e.message;S.phase="error";render();
    });
}

function addHistFromPick(strikeNum, apy, coin, optType, expiryDate){
  var today = new Date().toLocaleDateString("ko-KR");
  var record = {
    id: Date.now(),
    createdAt: today,
    coin: coin,
    optType: optType,
    strike: String(strikeNum),
    apy: String((apy*100).toFixed(2)),
    qty: "",
    note: "분석에서 저장",
    outcome: "pending",
    expiry: expiryDate || today
  };
  S.hist = [record].concat(S.hist);
  lsSet(HK, S.hist);
}

function cv(el,ac,li){el.style.setProperty("--ac",ac);el.style.setProperty("--li",li);}
function mk(tag,cls,html){var el=document.createElement(tag);if(cls)el.className=cls;if(html!==undefined)el.innerHTML=html;return el;}

function closeTodayModal(){
  var old = document.getElementById("today-modal");
  if(old) old.remove();
  S.showTodayModal = false;
}

function renderTodayModal(){
  if(document.getElementById("today-modal")) return;
  var today = new Date().toLocaleDateString("ko-KR");
  var todayItems = S.hist.filter(function(h){ return h.outcome==="pending" && h.expiry === today; });
  var modal = mk("div","modal-bg");
  modal.id = "today-modal";
  var box = mk("div","modal-box");
  var header = mk("div");
  header.style.display = "flex";
  header.style.justifyContent = "space-between";
  header.style.alignItems = "center";
  header.style.marginBottom = "12px";
  var title = mk("div");
  title.style.fontWeight = "700";
  title.style.fontSize = "15px";
  title.textContent = "📅 오늘 만기 상품 (" + today + ")";
  var closeBtn = mk("span");
  closeBtn.textContent = "✕";
  closeBtn.style.cssText = "font-size:20px;cursor:pointer;color:#aaa";
  closeBtn.onclick = function(e){ e.stopPropagation(); closeTodayModal(); };
  header.appendChild(title);
  header.appendChild(closeBtn);
  box.appendChild(header);
  if(todayItems.length === 0){
    var empty = mk("div");
    empty.style.textAlign = "center";
    empty.style.color = "#aaa";
    empty.style.padding = "20px";
    empty.textContent = "오늘 만기인 듀얼 인베스트먼트가 없습니다.";
    box.appendChild(empty);
  } else {
    todayItems.forEach(function(h){
      var item = mk("div","hi");
      item.innerHTML = '<div class="hih"><div><span style="font-family:monospace;font-weight:700;font-size:14px">$'+Number(h.strike).toLocaleString()+'</span><span style="font-size:11px;color:#888;margin-left:8px">'+h.coin+(h.optType==="P"?" 풋":" 콜")+" · "+h.apy+"% APY"+(h.qty?" · "+h.qty+"코인":"")+'</span></div>'
        +'<span class="bdg" style="background:#FAEEDA;color:#854F0B">진행중</span></div>'
        +'<div style="font-size:11px;color:#aaa">저장일: '+h.createdAt+(h.note?" · "+h.note:"")+'</div>';
      box.appendChild(item);
    });
  }
  modal.appendChild(box);
  modal.addEventListener("click", function(e){
    if(e.target === modal) closeTodayModal();
  });
  document.body.appendChild(modal);
  S.showTodayModal = true;
}

function renderAnalysis(){
  var i=inst(),d=S.data,w=mk("div");
  if(S.phase==="error"){w.appendChild(mk("div","eb","<b>오류:</b> "+S.err));return w;}
  if(S.phase==="idle"){w.innerHTML='<div class="em"><div style="font-size:36px;margin-bottom:8px">◈</div><div style="font-weight:700;color:#444;font-size:15px;margin-bottom:4px">'+i.label+' 분석 준비</div><div style="font-size:12px">가중 ATR · 공포탐욕 · DVOL · 안전 TOP3</div></div>';return w;}
  if(S.phase==="loading"){w.innerHTML='<div class="ld"><div style="font-size:13px;font-weight:600;color:#555;margin-bottom:6px">OKX 실시간 조회 중...</div><div style="font-size:11px;color:#bbb;margin:3px 0">· 현재가·캔들·펀딩비율</div><div style="font-size:11px;color:#bbb;margin:3px 0">· DCD 상품 목록</div><div style="font-size:11px;color:#bbb;margin:3px 0">· 공포탐욕·DVOL·가중ATR</div></div>';return w;}
  if(!d)return w;
  w.appendChild(mk("div","ts","OKX 실시간 · "+S.ts));

  var mg=mk("div","mg");
  [{l:i.coin+" 현재가",v:"$"+fmt(d.price),s:(d.change24h>=0?"+":"")+d.change24h.toFixed(2)+"% (24h)",sc:d.change24h>=0?"#3B6D11":"#A32D2D",vc:i.ac},
   {l:"가중 ATR",v:"$"+fmt(d.wATR),s:"2× = $"+fmt(d.atr2x)},
   {l:i.optType==="C"?"최소 안전 행사가":"최대 안전 행사가",v:"$"+fmt(d.safeStrike),s:"가중ATR×2 vs 5%"},
   {l:"펀딩(8h)",v:(d.fundingRate>=0?"+":"")+(d.fundingRate*100).toFixed(4)+"%",s:d.fundingStatus==="hot"?"과열 주의":d.fundingStatus==="negative"?"약세":"중립",sc:d.fundingStatus==="hot"?"#A32D2D":d.fundingStatus==="negative"?"#854F0B":"#3B6D11"}
  ].forEach(function(m){mg.appendChild(mk("div","mc",'<div class="ml">'+m.l+'</div><div class="mv" style="color:'+(m.vc||"#1a1a1a")+'">'+m.v+'</div><div class="ms" style="color:'+(m.sc||"#aaa")+'">'+m.s+'</div>'));});
  w.appendChild(mg);

  var fg=d.fearGreed||{value:50,label:"-"};
  w.appendChild(mk("div","card",'<div class="fg2"><div><div class="ct">공포탐욕</div><div style="font-size:22px;font-weight:800;color:'+fgC(fg.value)+'">'+fg.value+'</div><div style="font-size:10px;color:'+fgC(fg.value)+';font-weight:600">'+fg.label+'</div><div class="rb2"><div class="rbi2" style="width:'+fg.value+'%;background:'+fgC(fg.value)+'"></div></div></div><div><div class="ct">DVOL ('+i.coin+')</div><div style="font-size:22px;font-weight:800;color:'+(d.dvolSignal==="high"?"#A32D2D":d.dvolSignal==="low"?"#3B6D11":"#1a1a1a")+'">'+(d.dvol?d.dvol.toFixed(1):"-")+'</div><div style="font-size:10px;font-weight:600;color:'+(d.dvolSignal==="high"?"#A32D2D":d.dvolSignal==="low"?"#3B6D11":"#888")+'">'+(d.dvolSignal==="high"?"IV 과열→버퍼 확대":d.dvolSignal==="low"?"IV 낮음":"IV 보통")+'</div></div></div>'));

  var maxR=Math.max.apply(null,(d.ranges||[]).map(function(r){return r.range;}));maxR=maxR||1;
  var rc=mk("div","card");rc.appendChild(mk("div","ct","가중 ATR 변동폭"));
  (d.ranges||[]).forEach(function(r){
    var bw=Math.round((r.range/maxR)*100),op=r.weight>=3?"1":r.weight>=2?".6":".3";
    rc.appendChild(mk("div","rr",'<span style="min-width:36px">'+r.date+'</span><span style="min-width:18px;font-size:9px;font-weight:700;color:'+(r.weight>=3?i.ac:r.weight>=2?"#888":"#ccc")+'">'+(r.weight>=3?"×3":r.weight>=2?"×2":"×1")+'</span><div class="ro"><div class="ri" style="width:'+bw+'%;background:'+i.ac+';opacity:'+op+'"></div></div><span style="min-width:58px;text-align:right">$'+fmt(r.range)+'</span>'));
  });
  w.appendChild(rc);

  var picks=top3();
  var pc=mk("div","card");cv(pc,i.ac,i.li);
  pc.appendChild(mk("div","ct","안전 범위 내 추천 TOP 3 (APY 순위) — 탭해서 선택"));
  if(!picks.length){
    pc.appendChild(mk("div","","<div style='font-size:12px;color:#aaa;text-align:center;padding:10px 0'>현재 만기 범위 내 안전 기준 충족 상품 없음<br>만기를 늘려보세요</div>"));
  } else {
    picks.forEach(function(p,idx){
      var otm=i.optType==="C"?(((p.strikeNum-d.price)/d.price)*100).toFixed(2):(((d.price-p.strikeNum)/d.price)*100).toFixed(2);
      var card=mk("div","pick-card"+(S.selPick===idx?" on":""));cv(card,i.ac,i.li);
      card.innerHTML='<div style="font-size:10px;font-weight:700;color:'+(S.selPick===idx?i.ac:"#aaa")+';margin-bottom:4px">'+(idx===0?"🥇 1위 — APY 최고":idx===1?"🥈 2위":"🥉 3위")+'</div>'
        +'<div style="display:flex;justify-content:space-between;align-items:center">'
        +'<div><div style="font-size:20px;font-weight:800;font-family:monospace;color:'+(S.selPick===idx?i.ac:"#1a1a1a")+'">'+"$"+fmt(p.strikeNum)+'</div>'
        +'<div style="font-size:11px;color:#888;margin-top:3px">만기 '+p.expDate+' ('+Math.ceil(p.daysLeft)+'일) · OTM +'+otm+'% · 최소 '+p.minSize+i.coin+'</div></div>'
        +'<div style="font-size:18px;font-weight:700;font-family:monospace;color:'+i.ac+'">'+(p.apy*100).toFixed(2)+'%</div></div>';
      (function(n){card.onclick=function(){S.selPick=n;render();};})(idx);
      pc.appendChild(card);
    });

    var sp=picks[S.selPick];
    var score=d.riskScore||0;
    var bc=score>=70?"#639922":score>=50?"#EF9F27":"#E24B4A";
    var sobj=SAF[slv(score)];
    var det=mk("div");det.style="border-top:1px solid #f0f0f0;padding-top:10px;margin-top:4px";
    [["상품 ID",sp.productId],["리스크 점수",score+"/100"],["안전 등급",null]].forEach(function(r){
      var row=mk("div","rrow");row.innerHTML='<span style="color:#888">'+r[0]+'</span>';
      if(r[0]==="안전 등급")row.innerHTML+='<span class="bdg" style="background:'+sobj.bg+';color:'+sobj.c+'">'+sobj.l+'</span>';
      else row.innerHTML+='<span style="font-family:monospace;font-weight:600;font-size:'+(r[0]==="상품 ID"?"10":"12")+'px">'+r[1]+'</span>';
      det.appendChild(row);
    });
    det.innerHTML+='<div class="rrb"><div style="width:'+score+'%;height:100%;border-radius:3px;background:'+bc+'"></div></div><div class="rbl"><span>위험</span><span>보통</span><span>안전</span></div>';
    var saveBtn=mk("button","sb","+ 오늘 만기 추적 목록에 저장");saveBtn.style.marginTop="10px";
    (function(p2, coin, optType, expDate){saveBtn.onclick=function(){addHistFromPick(p2.strikeNum, p2.apy, coin, optType, expDate); render();};})(sp, i.coin, i.optType, sp.expDate);
    det.appendChild(saveBtn);
    pc.appendChild(det);
  }
  w.appendChild(pc);

  var all=mk("div","card");all.appendChild(mk("div","ct","전체 상품 ("+(d.products?d.products.length:0)+"개)"));
  all.appendChild(mk("div","pgrid",'<span style="font-size:9px;color:#bbb;font-weight:700">행사가</span><span style="font-size:9px;color:#bbb;font-weight:700">만기</span><span style="font-size:9px;color:#bbb;font-weight:700;text-align:right">APY</span><span style="font-size:9px;color:#bbb;font-weight:700;text-align:right">안전</span>'));
  (d.products||[]).slice(0,12).forEach(function(p){
    var isSafe=i.optType==="C"?p.strikeNum>=d.safeStrike:p.strikeNum<=d.safeStrike;
    var isTop=picks.some(function(pk){return pk.productId===p.productId;});
    var row=mk("div","pr pgrid");if(isTop)row.style.background=i.li;
    row.innerHTML='<span style="font-family:monospace;font-weight:'+(isTop?700:400)+';color:'+(isTop?i.ac:"#1a1a1a")+';font-size:11px">'+(isTop?"★ ":"")+Math.round(p.strikeNum).toLocaleString()+'</span><span style="color:#666;font-size:11px">'+p.expDate+' <span style="color:#bbb;font-size:9px">('+Math.ceil(p.daysLeft)+'일)</span></span><span style="text-align:right;font-family:monospace;font-weight:600;font-size:11px">'+(p.apy*100).toFixed(1)+'%</span><span style="text-align:right"><span style="font-size:10px;padding:1px 4px;border-radius:4px;background:'+(isSafe?"#EAF3DE":"#FCEBEB")+';color:'+(isSafe?"#3B6D11":"#A32D2D")+';font-weight:700">'+(isSafe?"✓":"✗")+'</span></span>';
    all.appendChild(row);
  });
  w.appendChild(all);
  w.appendChild(mk("div","disc","※ OKX 실시간 데이터. 실제 구독 전 OKX 앱 확인. 원금 손실 위험."));
  return w;
}

function render(){
  // 모달 상태 보존 (render() 실행 전에 열려 있었는지 확인)
  var wasModalOpen = S.showTodayModal && document.getElementById("today-modal");
  
  var i=inst();
  var app=document.getElementById("app");
  app.innerHTML="";cv(app,i.ac,i.li);
  var hd=mk("div","hd");cv(hd,i.ac,i.li);

  var tabs=mk("div","tabs");
  INSTS.forEach(function(it){
    var t=mk("div","tab"+(it.key===S.sk?" on":""));cv(t,it.ac,it.li);
    t.innerHTML='<div class="tl">'+it.label+'</div><div class="tt" style="background:'+it.tBg+';color:'+it.tC+'">'+it.tag+'</div>';
    (function(key){t.onclick=function(){S.sk=key;S.phase="idle";S.data=null;S.err="";S.selPick=0;render();};})(it.key);
    tabs.appendChild(t);
  });
  hd.appendChild(tabs);

  var ctrl=mk("div","ctrl");
  var sel=document.createElement("select");
  [{v:3,l:"만기 1~3일"},{v:5,l:"만기 1~5일"},{v:7,l:"만기 1~7일"}].forEach(function(o){var opt=document.createElement("option");opt.value=o.v;opt.textContent=o.l;if(o.v===S.exp)opt.selected=true;sel.appendChild(opt);});
  sel.onchange=function(){S.exp=Number(this.value);};
  var btn=mk("button","rb",S.phase==="loading"?"조회 중...":"▶ 실시간 분석");
  if(S.phase==="loading")btn.disabled=true;
  btn.onclick=runAnalysis;
  ctrl.appendChild(sel);ctrl.appendChild(btn);

  // 오늘 만기 조회 버튼 추가
  var todayBtn=mk("button","eb2","📅 오늘 만기 조회");
  todayBtn.onclick=function(e){
    e.stopPropagation();
    if(S.showTodayModal){
      closeTodayModal();
    } else {
      renderTodayModal();
    }
  };
  ctrl.appendChild(todayBtn);
  hd.appendChild(ctrl);

  app.appendChild(hd);

  var pg=mk("div","pg");cv(pg,i.ac,i.li);
  pg.appendChild(renderAnalysis());
  app.appendChild(pg);
  
  // 모달이 열려 있었다면 다시 그려주기 (render()로 인해 닫혔을 수 있으므로)
  if(wasModalOpen && !document.getElementById("today-modal")) {
    renderTodayModal();
  }
}
init();
</script>
</body>
</html>
